<?xml version='1.0' encoding='utf-8'?>
<systemList>
  <system>
    <name>quake3</name>
    <fullname>Quake III Arena</fullname>
    <manufacturer>id Software</manufacturer>
    <release>1999</release>
    <hardware>port</hardware>
    <path>~\..\roms\quake3</path>
    <extension>.quake3</extension>
    <command>"%HOME%\emulatorLauncher.exe" -gameinfo %GAMEINFOXML% %CONTROLLERSCONFIG% -system %SYSTEM% -emulator %EMULATOR% -core %CORE% -rom "%HOME%/../roms/quake3/data/ioq3/baseq3/"</command>
    <emulators>
      <emulator name="libretro">
        <cores>
          <core>vitaquake3</core>
        </cores>
      </emulator>
    </emulators>
    <platform>windows</platform>
    <theme>quake3</theme>
    <group>ports</group>
  </system>
</systemList>
