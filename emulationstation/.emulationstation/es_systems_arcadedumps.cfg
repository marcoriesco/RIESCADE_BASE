<?xml version="1.0" encoding="UTF-8"?>

<systemList>
	<system>
		<fullname>Arcade Dumps</fullname>
		<name>teknoparrot</name>
		<path>~\..\roms\teknoparrot</path>
		<manufacturer>Arcade</manufacturer>
		<release/>
		<hardware>arcade</hardware>
		<extension>.teknoparrot .parrot .game .7z .zip .rar .wsquashfs</extension>
		<command>"%HOME%\emulatorLauncher.exe" -gameinfo %GAMEINFOXML% %CONTROLLERSCONFIG% -system %SYSTEM% -emulator %EMULATOR% -core %CORE% -rom %ROM%</command>
		<platform>teknoparrot, arcade</platform>
		<theme>arcadedumps</theme>
		<emulators>
			<emulator name="teknoparrot" />
			<emulator name="arcadedumps PY" command="python %HOME%\.emulationstation\themes\RIESCADE_ORIGINS\resources\_scripts\src\arcadeDumpLauncher.py %ROM%" />
			<emulator name="arcadedumps EXE" command="%HOME%\arcadeDumpLauncher.exe %ROM%" />
		</emulators>
	</system>
</systemList>