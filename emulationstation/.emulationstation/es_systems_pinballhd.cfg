<?xml version="1.0"?>
<systemList>
    <system>
        <fullname>Pinball HD</fullname>
        <name>pinballhd</name>
        <manufacturer>Zen Studios</manufacturer>
        <release>2010</release>
        <hardware>pinball</hardware>
        <path>~\..\roms\pinballhd</path>
        <extension>.pc .exe .squashfs .wtgz</extension>
        <command>emulatorlauncher %CONTROLLERSCONFIG% -system %SYSTEM% -rom %ROM% -gameinfoxml %GAMEINFOXML% -systemname %SYSTEMNAME%</command>
        <emulators>
            <emulator name="windows"/>
        </emulators>
        <platform>windows</platform>
        <theme>pinballhd</theme>
    </system>
</systemList>